name: Build

on:
  push:
    branches:
      - main
    paths:
      - .github/**
      - src/**
      - Directory.Build.props
      - Directory.Packages.props
  pull_request:
    branches:
      - main
    paths:
      - .github/**
      - src/**
      - Directory.Build.props
      - Directory.Packages.props
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: Restore dependencies
      run: dotnet restore ./src/Shark.Fido2.Portal.slnx

    - name: Build
      run: dotnet build ./src/Shark.Fido2.Portal.slnx --configuration Release --no-restore
